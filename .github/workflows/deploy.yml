name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CSS and JS
        run: npm run build

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy/src/i18n _deploy/src/core _deploy/src/modules _deploy/dist/modules _deploy/public
          cp index.html _deploy/
          cp dist/styles.css _deploy/dist/
          cp -r dist/modules _deploy/dist/ 2>/dev/null || true
          cp src/main.js _deploy/src/
          cp -r src/core _deploy/src/
          cp -r src/i18n _deploy/src/
          cp -r src/modules/pwned _deploy/src/modules/
          cp -r src/modules/attack-scenarios _deploy/src/modules/
          cp -r public _deploy/ 2>/dev/null || true
          touch _deploy/.nojekyll

      - name: Inject commit hash
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          sed -i "s/{{BUILD_HASH}}/$COMMIT_HASH/g" _deploy/index.html

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _deploy
          branch: gh-pages
          clean: true
